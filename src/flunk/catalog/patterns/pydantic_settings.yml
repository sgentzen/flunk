# Detect config files that hand-roll env-var parsing.
#
# Strategy: match every `os.environ.get(...)` and `os.getenv(...)` call.
# The Python post-process pass (catalog/__init__.py) groups by file and
# only emits a finding when count ≥ 3 in a single file (presence-check
# branches are filtered out first; see catalog/env_read_filter.py).
#
# Why not threshold inside Semgrep: Semgrep is per-pattern, not per-file
# aggregating. Aggregation lives in Python so we can also count across
# multiple equivalent forms (`os.environ.get`, `os.getenv`,
# `os.environ["KEY"]`) without a metavariable-comparison hack.
#
# Expected fires: erate-filing-assistant, erate-prospector
# (job-stalker excluded 2026-05-29 — its os.environ hits are presence-check
#  branches, not config reads; see catalog/env_read_filter.py)
rules:
  - id: flunk.pydantic-settings
    languages: [python]
    severity: WARNING
    message: >-
      File hand-rolls environment-variable parsing.
      Use pydantic-settings (https://docs.pydantic.dev/latest/concepts/pydantic_settings/)
      for typed, validated config with one declaration per field.
    pattern-either:
      - pattern: os.environ.get(...)
      - pattern: os.getenv(...)
      - pattern: os.environ[...]
